/* ── VARIABLES Y RESET ── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#08080f;--surface:#0f0f1a;--card:#131320;--card-h:#181828;
  --border:rgba(255,255,255,0.07);--border-h:rgba(255,255,255,0.14);
  --text:#e8e8f0;--muted:rgba(232,232,240,0.4);--dim:rgba(232,232,240,0.2);
  --purple:#534AB7;--purple-l:#AFA9EC;--purple-bg:rgba(83,74,183,0.12);
  --teal:#1D9E75;--transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* Fondo decorativo */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:linear-gradient(rgba(255,255,255,.02) 1px, transparent 1px),linear-gradient(90deg, rgba(255,255,255,.02) 1px, transparent 1px);
  background-size:40px 40px;mask-image:linear-gradient(to bottom, rgba(0,0,0,1), transparent 85%);
}

/* ── ANIMACIONES ── */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(15px); }
  to { opacity: 1; transform: translateY(0); }
}

.orb{position:fixed;border-radius:50%;pointer-events:none;z-index:0;filter:blur(80px);opacity:0.5}
.orb1{width:500px;height:500px;background:var(--purple);top:-150px;left:-100px;opacity:0.1}
.orb2{width:400px;height:400px;background:#1D9E75;top:200px;right:-120px;opacity:0.06}

#app{position:relative;z-index:1;max-width:1120px;margin:0 auto;padding:0 24px 64px}

/* ── HEADER ── */
header{
  display:flex;align-items:center;justify-content: space-between;
  padding:20px 0; border-bottom:1px solid var(--border);
  flex-wrap:wrap;gap:16px; position:sticky;top:0;z-index:20;
  backdrop-filter:blur(20px); background:rgba(8,8,15,0.8);
}
.logo{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;letter-spacing:-0.5px}
.logo span{color:var(--purple-l)}

#search{
  background:rgba(255,255,255,.05); border:1px solid var(--border);
  border-radius:12px; padding:0 16px; height:42px;
  color:var(--text); width:300px; transition: var(--transition);
}
#search:focus{ width: 340px; border-color:var(--purple-l); background:rgba(255,255,255,.08); outline:none; }

/* ── HERO ── */
.hero{
  margin:32px 0; padding:40px; border:1px solid var(--border); border-radius:32px;
  background: linear-gradient(135deg, rgba(255,255,255,.05), rgba(255,255,255,.01));
  box-shadow: 0 20px 50px rgba(0,0,0,0.3);
}
.hero-grid{ display:grid; grid-template-columns: 1.5fr 1fr; gap:40px; align-items:center; }
.hero h1{ font-family:'Syne',sans-serif; font-size:clamp(32px, 5vw, 56px); line-height:1; margin:12px 0; }
.hero-sub{ color:var(--muted); font-size:16px; line-height:1.6; }

/* ── CATEGORÍAS ── */
.cats{display:flex;gap:8px;flex-wrap:wrap;padding:20px 0}
.cat-btn{
  font-size:13px; padding:8px 18px; border-radius:999px;
  border:1px solid var(--border); background:rgba(255,255,255,0.03);
  color:var(--muted); cursor:pointer; transition: var(--transition);
}
.cat-btn:hover{ background:var(--card-h); color:var(--text); transform: translateY(-2px); }
.cat-btn.active{ background:var(--purple); color:white; border-color:var(--purple); box-shadow:0 8px 20px rgba(83,74,183,0.3); }

/* ── GRID ── */
.grid{
  display:grid; 
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
  gap:16px;
}

/* ── TARJETAS ── */
.lcard{
  background: var(--card); border:1px solid var(--border);
  border-radius:20px; padding:20px; min-height:120px;
  text-decoration:none; display:flex; flex-direction:column; justify-content:space-between;
  transition: var(--transition); position:relative; overflow:hidden;
  animation: fadeInUp 0.5s ease backwards;
}
.lcard:hover{
  background:var(--card-h); border-color:var(--purple-l);
  transform: translateY(-6px) scale(1.02);
  box-shadow: 0 15px 35px rgba(0,0,0,0.4);
}
.lcard-label{ font-size:14px; font-weight:600; color:var(--text); margin-bottom:10px; line-height:1.4;}
.lcard-meta{ display:flex; align-items:center; justify-content: space-between; }
.lcard-platform{ font-size:10px; font-weight:800; padding:4px 8px; border-radius:6px; background:rgba(255,255,255,0.05); }

/* ── FORMULARIO ── */
.add-section{
  margin-top:50px; padding:30px; border-radius:24px;
  background:rgba(255,255,255,0.02); border:1px solid var(--border);
}
.add-row{ display:grid; grid-template-columns: 1fr 1fr 0.6fr auto; gap:12px; }
.add-row input, .add-row select{
  background:var(--bg); border:1px solid var(--border); border-radius:10px;
  padding:12px; color:white; outline:none;
}
.add-btn{
  background:var(--purple); color:white; border:none; border-radius:10px;
  padding:0 25px; font-weight:700; cursor:pointer; transition: var(--transition);
}

@media(max-width:768px){
  .hero-grid{ grid-template-columns: 1fr; }
  .add-row{ grid-template-columns: 1fr; }
  #search{ width: 100%; }
}
</style>

let DATA = JSON.parse(localStorage.getItem('MY_LINKS_DB')) || SEED;
let filterCat = 'Todos';

function save(){ localStorage.setItem('MY_LINKS_DB', JSON.stringify(DATA)); }

function render() {
  const query = document.getElementById('search').value.toLowerCase();
  const container = document.getElementById('content');
  container.innerHTML = '';

  const filtered = DATA.filter(item => {
    const matchesSearch = item.l.toLowerCase().includes(query);
    const matchesCat = filterCat === 'Todos' || item.c === filterCat;
    return matchesSearch && matchesCat;
  });

  filtered.forEach((item, index) => {
    const card = document.createElement('a');
    card.href = item.u;
    card.target = "_blank";
    card.className = 'lcard';
    card.style.animationDelay = `${index * 0.02}s`;
    
    card.innerHTML = `
      <div class="lcard-label">${item.l}</div>
      <div class="lcard-meta">
        <span class="lcard-platform" style="color:${CATS[item.c]?.color || '#fff'}">${item.c}</span>
        <span style="font-size:10px; opacity:0.3">${item.y}</span>
      </div>
    `;
    container.appendChild(card);
  });

  document.getElementById('stat-total').textContent = DATA.length;
}

function buildCats() {
  const nav = document.getElementById('cats');
  nav.innerHTML = `<button class="cat-btn ${filterCat === 'Todos'?'active':''}" onclick="setCat('Todos')">Todos</button>`;
  Object.keys(CATS).forEach(c => {
    nav.innerHTML += `<button class="cat-btn ${filterCat === c?'active':''}" onclick="setCat('${c}')">${c}</button>`;
  });

  const sel = document.getElementById('add-cat-sel');
  sel.innerHTML = Object.keys(CATS).map(c => `<option value="${c}">${c}</option>`).join('');
}

function setCat(c) { filterCat = c; buildCats(); render(); }

function addLink() {
  const l = document.getElementById('add-label').value;
  const u = document.getElementById('add-url').value;
  const c = document.getElementById('add-cat-sel').value;
  if(!l || !u) return alert("Completa los campos");

  DATA.unshift({l, u, c, y: new Date().getFullYear()});
  save(); render();
  document.getElementById('add-label').value = '';
  document.getElementById('add-url').value = '';
}

// Inicialización
buildCats();
render();

// Atajo '/' para buscar
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    document.getElementById('search').focus();
  }
});
</script>
</body>
